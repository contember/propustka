name: Deploy

# Deploys propustka (the IAM Worker + admin SPA) to Cloudflare. Mirrors the opice
# deploy model: push main → stage, push deploy/prod → prod, plus manual dispatch.
# Secrets/vars are scoped per GitHub Environment (stage/prod). propustka is fully
# native-auth now (no Cloudflare Access) — the runtime secrets are the token signing
# keys + the OIDC client secret, pushed after deploy.

on:
  push:
    branches:
      # main → stage auto-deploy is OFF — stage is currently broken and every
      # main push went red. Re-add `- main` here once stage is fixed; until then
      # deploy stage on demand via workflow_dispatch (environment=stage).
      - deploy/prod      # → prod
      - deploy/mangoweb  # → mangoweb (manGoweb CF account)
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Which CF environment to deploy to
        options: [stage, prod, mangoweb]
        default: stage

concurrency:
  # Serialize deploys per target so oblaka's KV state never races.
  group: deploy-propustka-${{ github.event.inputs.environment || (github.ref == 'refs/heads/deploy/prod' && 'prod' || (github.ref == 'refs/heads/deploy/mangoweb' && 'mangoweb' || 'stage')) }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/deploy/prod' && 'prod' || (github.ref == 'refs/heads/deploy/mangoweb' && 'mangoweb' || 'stage')) }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # wrangler launches under Node even via bunx and requires Node 22+; the runner
      # default is 20.
      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Resolve target environment
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/deploy/prod" ]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/deploy/mangoweb" ]; then
            echo "env=mangoweb" >> "$GITHUB_OUTPUT"
          else
            echo "env=stage" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The admin SPA is served by the Worker via the ASSETS binding, so it must exist
      # in packages/admin-ui/dist BEFORE oblaka/wrangler package the Worker. `build`
      # chains the buzola codegen (`gen`) itself.
      - name: Build admin-ui SPA
        working-directory: packages/admin-ui
        run: bun run build

      # oblaka provisions the Worker + D1, writes the real ids + non-secret vars
      # (HUMAN_*, OIDC_*, IAM_BOOTSTRAP_ADMINS, ENVIRONMENT) into wrangler.jsonc.
      # PROPUSTKA_SIGNING_KEYS / PROPUSTKA_OIDC_CLIENT_SECRET are validated here (oblaka
      # throws if absent) but deliberately NOT written to wrangler.jsonc — they are Worker
      # secrets, pushed after deploy (the step below).
      - name: Provision D1 + write wrangler.jsonc (oblaka --remote)
        working-directory: packages/worker
        env:
          # Central human-admission allowlist (JSON arrays) — who may log in as a human, for every
          # app. A `*` entry = admit-all. Domains required; emails optional.
          PROPUSTKA_HUMAN_EMAIL_DOMAINS: ${{ vars.PROPUSTKA_HUMAN_EMAIL_DOMAINS }}
          PROPUSTKA_HUMAN_EMAILS: ${{ vars.PROPUSTKA_HUMAN_EMAILS }}
          # Per-target admin Custom Domain (GitHub Environment var) — also propustka's own token `iss`
          # + OIDC redirect base. Unset → *.workers.dev.
          PROPUSTKA_HOSTNAME: ${{ vars.PROPUSTKA_HOSTNAME }}
          # Normally empty ('[]'); set to the first admin's email for the bootstrap
          # deploy only, then clear it and re-run. See the repo variable.
          PROPUSTKA_BOOTSTRAP_ADMINS: ${{ vars.PROPUSTKA_BOOTSTRAP_ADMINS }}
          # propustka-native OIDC SSO upstream (any provider via discovery).
          PROPUSTKA_OIDC_ISSUER: ${{ vars.PROPUSTKA_OIDC_ISSUER }}
          PROPUSTKA_OIDC_CLIENT_ID: ${{ vars.PROPUSTKA_OIDC_CLIENT_ID }}
          PROPUSTKA_OIDC_SCOPES: ${{ vars.PROPUSTKA_OIDC_SCOPES }}
          PROPUSTKA_OIDC_REQUIRE_VERIFIED_EMAIL: ${{ vars.PROPUSTKA_OIDC_REQUIRE_VERIFIED_EMAIL }}
          PROPUSTKA_SESSION_COOKIE_DOMAIN: ${{ vars.PROPUSTKA_SESSION_COOKIE_DOMAIN }}
          # Validated-present here (oblaka throws if absent) but pushed as Worker secrets below.
          PROPUSTKA_SIGNING_KEYS: ${{ secrets.PROPUSTKA_SIGNING_KEYS }}
          PROPUSTKA_OIDC_CLIENT_SECRET: ${{ secrets.PROPUSTKA_OIDC_CLIENT_SECRET }}
        run: |
          bunx oblaka oblaka.ts \
            --env=${{ steps.target.outputs.env }} \
            --state-namespace=propustka-state \
            --remote

      # `DB` is the binding name from the oblaka-generated wrangler.jsonc; the actual
      # CF database name is `${env}-propustka`. The binding is env-stable.
      - name: Apply D1 migrations (remote)
        working-directory: packages/worker
        run: bunx wrangler d1 migrations apply DB --remote

      - name: Deploy Worker
        working-directory: packages/worker
        run: bunx wrangler deploy

      # The native-auth runtime secrets: the ES256 token signing keys + the OIDC client
      # secret. oblaka can't express secrets, so push them as Worker secrets AFTER deploy.
      # Idempotent; persists across deploys. The wrangler secret names are the Worker
      # binding names (env.ts): PROPUSTKA_SIGNING_KEYS + OIDC_CLIENT_SECRET.
      - name: Set Worker secrets (native auth)
        working-directory: packages/worker
        env:
          PROPUSTKA_SIGNING_KEYS: ${{ secrets.PROPUSTKA_SIGNING_KEYS }}
          PROPUSTKA_OIDC_CLIENT_SECRET: ${{ secrets.PROPUSTKA_OIDC_CLIENT_SECRET }}
        run: |
          printf '%s' "$PROPUSTKA_SIGNING_KEYS" | bunx wrangler secret put PROPUSTKA_SIGNING_KEYS
          printf '%s' "$PROPUSTKA_OIDC_CLIENT_SECRET" | bunx wrangler secret put OIDC_CLIENT_SECRET

      - name: Summary
        run: |
          echo "### Deployed propustka to **${{ steps.target.outputs.env }}** :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: \`${{ github.event_name }}\` on \`${{ github.ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
