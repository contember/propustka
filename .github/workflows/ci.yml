name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Fans out to every package's `typecheck` (admin-ui chains the buzola codegen first).
      - name: Typecheck
        run: bun run typecheck

      # Bun's test runner discovers every packages/*/src/__tests__/*.test.ts —
      # core (matcher, ids), worker (resolve, auth, jwt, capabilities, admin-router),
      # client (client, fake, scope).
      - name: Test
        run: bun test

      # The admin SPA ships via the Worker's ASSETS binding — make sure it builds.
      - name: Build admin-ui
        working-directory: packages/admin-ui
        run: bun run build
